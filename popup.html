<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>OneDrive / SharePoint PDF Downloader</title>
<style>
  :root {
    --accent: #2563eb;
    --accent-dark: #1d4ed8;
    --ink: #1f2328;
    --muted: #6b7280;
    --border: #e5e7eb;
    --bg-soft: #f7f7f8;
    --ok: #1a8754;
    --warn: #c2410c;
  }

  * { box-sizing: border-box; }

  body {
    font-family: "PingFang TC", "Microsoft JhengHei", -apple-system, "Segoe UI", sans-serif;
    width: 380px;
    padding: 0;
    margin: 0;
    color: var(--ink);
    background: #fff;
  }

  header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 16px 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff;
  }

  header img { width: 22px; height: 22px; flex-shrink: 0; }
  header h1 { font-size: 14px; margin: 0; font-weight: 600; line-height: 1.3; flex: 1; }

  #langSelect {
    flex-shrink: 0;
    font-size: 11px;
    padding: 3px 5px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.55);
    background: rgba(255,255,255,0.15);
    color: #fff;
    cursor: pointer;
  }
  #langSelect option { color: #1f2328; }

  .body-pad { padding: 12px 16px 16px; }

  details.help {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-soft);
    margin-bottom: 10px;
    padding: 0;
    overflow: hidden;
  }
  details.help summary {
    cursor: pointer;
    list-style: none;
    padding: 8px 10px;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  details.help summary::-webkit-details-marker { display: none; }
  details.help summary::before { content: "💡"; }
  details.help[open] summary::after { content: "▲"; margin-left: auto; font-size: 9px; color: var(--muted); }
  details.help:not([open]) summary::after { content: "▼"; margin-left: auto; font-size: 9px; color: var(--muted); }

  .help ol {
    margin: 0;
    padding: 0 10px 10px 26px;
    font-size: 12px;
    color: #444;
    line-height: 1.7;
  }
  .help li { margin-bottom: 2px; }
  .help b { color: var(--ink); }

  #refresh {
    width: 100%;
    padding: 9px;
    margin-bottom: 12px;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.15s ease;
  }
  #refresh:hover { background: var(--accent-dark); }
  #refresh:active { transform: scale(0.99); }

  .item {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 10px;
    background: #fff;
    transition: box-shadow 0.15s ease;
  }
  .item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

  .item .row-top {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 6px;
  }
  .item .file-icon { font-size: 18px; line-height: 1.2; flex-shrink: 0; }
  .item .filename {
    font-size: 13px;
    font-weight: 600;
    word-break: break-all;
    line-height: 1.4;
  }

  .badges { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10.5px;
    padding: 2px 7px;
    border-radius: 999px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge.match { background: #eef0fd; color: var(--accent-dark); }
  .badge.large { background: #eef2ff; color: #3730a3; }
  .badge.size { background: var(--bg-soft); color: var(--muted); }
  .badge.auth-ok { background: #e7f6ec; color: var(--ok); }
  .badge.auth-bad { background: #fff1e6; color: var(--warn); }

  .item button {
    width: 100%;
    padding: 7px;
    cursor: pointer;
    background: #fff;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 7px;
    font-size: 12.5px;
    font-weight: 600;
    transition: all 0.15s ease;
  }
  .item button:hover:not(:disabled) { background: var(--accent); color: #fff; }
  .item button:disabled { opacity: 0.6; cursor: default; }
  .item:first-of-type button {
    background: var(--accent);
    color: #fff;
  }
  .item:first-of-type button:hover:not(:disabled) { background: var(--accent-dark); }

  #empty {
    font-size: 12.5px;
    color: var(--muted);
    text-align: center;
    padding: 28px 10px;
    line-height: 1.7;
  }
  #empty .empty-icon { font-size: 26px; display: block; margin-bottom: 6px; }

  footer {
    font-size: 10.5px;
    color: var(--muted);
    text-align: center;
    padding: 8px 12px 12px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }
</style>
</head>
<body>
  <header>
    <img src="icons/icon48.png" alt="" />
    <h1 id="hdrTitle">OneDrive / SharePoint<br/>PDF Downloader</h1>
    <select id="langSelect" title="Language">
      <option value="en">EN</option>
      <option value="zh-Hant">中文</option>
    </select>
  </header>

  <div class="body-pad">
    <details class="help">
      <summary id="helpSummary">How to use</summary>
      <ol id="helpSteps"></ol>
    </details>

    <button id="refresh"></button>
    <div id="list"></div>
    <div id="empty" style="display:none;">
      <span class="empty-icon">🔍</span>
      <span id="emptyText"></span>
    </div>
  </div>

  <footer id="footerText"></footer>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
